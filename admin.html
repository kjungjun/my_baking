<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | 초보자도 할 수 있다 베이킹</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="site-title"><a href="index.html">🍰 초보자도 할 수 있다 베이킹 · 관리자</a></h1>
      <nav>
        <a href="index.html" class="admin-link">← 홈으로</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- 로그인 섹션 -->
    <section id="login-section" class="admin-panel">
      <h2>관리자 로그인</h2>
      <form id="login-form" class="admin-form">
        <div id="login-error" class="error" style="display:none;"></div>
        <div class="form-row">
          <label for="login-email">이메일</label>
          <input type="email" id="login-email" autocomplete="email" required />
        </div>
        <div class="form-row">
          <label for="login-password">비밀번호</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <div class="form-row form-row-right">
          <button type="submit" class="btn btn-primary">로그인</button>
        </div>
      </form>
    </section>

    <!-- 로그인 후 관리 섹션 -->
    <section id="admin-section" class="admin-panel admin-panel-wide" style="display:none;">
      <div class="admin-user-bar">
        <span><strong id="user-email"></strong> 님으로 로그인됨</span>
        <button id="logout-btn" class="btn btn-secondary">로그아웃</button>
      </div>

      <!-- 관리자 탭 -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-target="tab-videos">동영상</button>
        <button class="admin-tab" data-target="tab-recipes">레시피</button>
        <button class="admin-tab" data-target="tab-tools">베이킹도구</button>
      </div>

      <!-- ============== 동영상 탭 ============== -->
      <div id="tab-videos" class="admin-tab-pane active">
        <h3>동영상 추가</h3>
        <form id="video-form" class="admin-form">
          <div class="error" data-error style="display:none;"></div>
          <div class="form-row">
            <label>제목</label>
            <input type="text" data-field="title" maxlength="100" required />
          </div>
          <div class="form-row">
            <label>YouTube URL</label>
            <input type="url" data-field="url" placeholder="https://youtu.be/XXXX" required />
          </div>
          <div class="form-row form-row-right">
            <button type="submit" class="btn btn-primary">등록</button>
          </div>
        </form>

        <h3 class="list-heading">등록된 동영상</h3>
        <ul id="video-list" class="admin-video-list">
          <li class="loading">불러오는 중…</li>
        </ul>
      </div>

      <!-- ============== 레시피 탭 ============== -->
      <div id="tab-recipes" class="admin-tab-pane">
        <h3>레시피 추가</h3>
        <form id="recipe-form" class="admin-form">
          <div class="error" data-error style="display:none;"></div>
          <div class="form-row">
            <label>제목</label>
            <input type="text" data-field="title" maxlength="100" required />
          </div>
          <div class="form-row">
            <label>YouTube URL (선택)</label>
            <input type="url" data-field="videoUrl" placeholder="https://youtu.be/XXXX (비워둬도 됨)" />
          </div>
          <div class="form-row">
            <label>레시피 본문</label>
            <textarea data-field="content" rows="6" required placeholder="재료&#10;&#10;만드는 법 1.&#10;2.&#10;..."></textarea>
          </div>
          <div class="form-row form-row-right">
            <button type="submit" class="btn btn-primary">등록</button>
          </div>
        </form>

        <h3 class="list-heading">등록된 레시피</h3>
        <ul id="recipe-list" class="admin-video-list">
          <li class="loading">불러오는 중…</li>
        </ul>
      </div>

      <!-- ============== 베이킹도구 탭 ============== -->
      <div id="tab-tools" class="admin-tab-pane">
        <h3>베이킹도구 추가</h3>
        <form id="tool-form" class="admin-form">
          <div class="error" data-error style="display:none;"></div>
          <div class="form-row">
            <label>제목</label>
            <input type="text" data-field="title" maxlength="100" required />
          </div>
          <div class="form-row">
            <label>YouTube URL (선택)</label>
            <input type="url" data-field="videoUrl" placeholder="https://youtu.be/XXXX (비워둬도 됨)" />
          </div>
          <div class="form-row">
            <label>설명</label>
            <textarea data-field="content" rows="5" required placeholder="도구 설명 / 사용법 / 구매 링크 등"></textarea>
          </div>
          <div class="form-row form-row-right">
            <button type="submit" class="btn btn-primary">등록</button>
          </div>
        </form>

        <h3 class="list-heading">등록된 도구</h3>
        <ul id="tool-list" class="admin-video-list">
          <li class="loading">불러오는 중…</li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>&copy; 2026 Baking Project</small>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
